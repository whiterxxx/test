<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lと舞子 ― プライベート・デスノート</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap');
  
  :root {
    --bg: #08080a;
    --panel: #101016;
    --border: #252530;
    --text: #e6e4e1;
    --muted: #7a7782;
    --accent: #c9a66b;
    --lewd: #c45c7a;
    --sweet: #e8a0b0;
    --dep: #8b6bb5;
    --danger: #b04a4a;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    line-height: 1.65;
  }
  
  h1 {
    font-family: 'Shippori Mincho', serif;
    font-weight: 500;
    font-size: 1.35rem;
    letter-spacing: 0.18em;
    color: var(--accent);
    margin-bottom: 4px;
    text-align: center;
  }
  
  .subtitle {
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 18px;
    letter-spacing: 0.12em;
  }
  
  #game {
    width: 100%;
    max-width: 680px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.45);
  }
  
  #status-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 12px 16px;
    background: #0c0c10;
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
  }
  
  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  
  .stat-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  
  .stat-label { color: var(--muted); font-size: 0.68rem; letter-spacing: 0.05em; }
  .stat-num { font-variant-numeric: tabular-nums; }
  
  .bar-wrap {
    height: 5px;
    background: #1a1a22;
    border-radius: 2px;
    overflow: hidden;
  }
  
  .bar { height: 100%; transition: width 0.45s cubic-bezier(0.4,0,0.2,1); }
  
  #lewd-bar { background: linear-gradient(90deg, #6b2e45, var(--lewd)); }
  #stamina-bar { background: linear-gradient(90deg, #2e456b, #5a8bc9); }
  #dep-bar { background: linear-gradient(90deg, #4a3a6b, var(--dep)); }
  
  #mode-display {
    padding: 7px 16px;
    font-size: 0.78rem;
    border-bottom: 1px solid var(--border);
    background: #0a0a0e;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  #mode-display span.mode-name {
    color: var(--accent);
    font-weight: 500;
  }
  
  #mode-display.sweet span.mode-name { color: var(--sweet); }
  #mode-display.interrogate span.mode-name { color: #7a9ac9; }
  #mode-display.training span.mode-name { color: #c98b6b; }
  
  #combo-display {
    font-size: 0.72rem;
    color: var(--muted);
  }
  
  #combo-display.active { color: var(--lewd); }
  
  #scene {
    padding: 20px 18px;
    min-height: 300px;
    max-height: 380px;
    overflow-y: auto;
    font-size: 0.92rem;
  }
  
  #scene .narration {
    color: var(--muted);
    font-style: italic;
    margin-bottom: 12px;
    font-size: 0.88rem;
  }
  
  #scene .l-line {
    color: var(--text);
    margin: 12px 0;
    padding-left: 14px;
    border-left: 2px solid var(--accent);
    line-height: 1.7;
  }
  
  #scene .maiko-line {
    color: var(--lewd);
    margin: 8px 0 8px 18px;
    font-size: 0.88rem;
  }
  
  #scene .sfx {
    color: var(--sweet);
    font-size: 0.82rem;
    letter-spacing: 0.04em;
    margin: 6px 0;
  }
  
  #scene .system {
    color: var(--dep);
    font-size: 0.75rem;
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
  }
  
  #scene .dote {
    color: #d4b08c;
    margin: 10px 0;
    padding-left: 14px;
    border-left: 2px solid #d4b08c;
    font-size: 0.9rem;
  }
  
  #actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }
  
  #actions button {
    background: #14141c;
    border: none;
    color: var(--text);
    padding: 13px 10px;
    font-family: inherit;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.18s, color 0.18s;
    position: relative;
  }
  
  #actions button:hover:not(:disabled) {
    background: #1c1c28;
  }
  
  #actions button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  
  #actions button.danger { color: #e8a0a0; }
  #actions button.sweet-btn { color: var(--sweet); }
  #actions button.dote-btn { color: #d4b08c; }
  #actions button.item-btn { color: #a0c4e8; }
  
  #actions button .hint {
    display: block;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 2px;
  }
  
  #start-screen, #end-screen {
    text-align: center;
    padding: 36px 24px;
  }
  
  #start-screen p, #end-screen p {
    margin: 12px 0;
    color: var(--muted);
    font-size: 0.88rem;
    line-height: 1.7;
  }
  
  #start-btn, #restart-btn {
    margin-top: 22px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 11px 28px;
    font-family: 'Shippori Mincho', serif;
    font-size: 0.92rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.22s;
  }
  
  #start-btn:hover, #restart-btn:hover {
    background: var(--accent);
    color: #0a0a0c;
  }
  
  #footer {
    margin-top: 14px;
    font-size: 0.65rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.08em;
  }
  
  .hidden { display: none !important; }
  
  #scene::-webkit-scrollbar { width: 4px; }
  #scene::-webkit-scrollbar-track { background: transparent; }
  #scene::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 2px; }
</style>
</head>
<body>
  <h1>Lと舞子</h1>
  <div class="subtitle">PRIVATE DEATH NOTE ― ENHANCED</div>
  
  <div id="game">
    <div id="start-screen">
      <p>これは、私と貴女だけの、より深く、より長く続く記録です。</p>
      <p>淫乱度・体力・依存度の三つのパラメータが連動し、<br>行動の積み重ねが次の展開を変えます。</p>
      <p style="font-size:0.8rem;margin-top:18px;color:#a09080;">

        依存度が高まるほど、私は貴女を「可愛がる」ようになります。
      </p>
      <button id="start-btn">記録を開始する</button>
    </div>
    
    <div id="main-screen" class="hidden">
      <div id="status-bar">
        <div class="stat">
          <div class="stat-top">
            <span class="stat-label">淫乱度</span>
            <span class="stat-num" id="lewd-val">0</span>

        </div>
        <div class="stat">
          <div class="stat-top">
            <span class="stat-label">依存度</span>
            <span class="stat-num" id="dep-val">0</span>
          </div>

        </div>
      </div>
      
      <div id="mode-display">

        <div id="combo-display">連続：0</div>
      </div>
      
      <div id="scene"></div>
      
      <div id="actions"></div>
    </div>
    
    <div id="end-screen" class="hidden">

      <button id="restart-btn">最初から、もう一度</button>
    </div>
  </div>
  
  <div id="footer">L &amp; 舞子 ― 二人だけのデスノート</div>

      narration: '指を二本、ゆっくりと中に入れ、敏感な場所を探る。',
      l: 'ここを刺激されると、すぐに声が出ますね。\n自分で腰を動かして、私の指を気持ちよくしてください。\n……良い子ですね。',
      sfx: 'くちゅっ……ぬちゅっ……'
    },
    {
      narration: '挿入したまま、動かさず、ただ締め付けを観察する。',
      l: '私のものを、自分から咥え込むように締め付けてください。\nできない場合は、私が強制的に動かします。\n……どちらがいいですか、舞子？'
    }
  ],
  
  useSweet: [
    {
      narration: '私は懐から小さなケーキを取り出し、フォークで一口分を切り分ける。',
      l: 'ほら。口を開けてください。\n私の好物を、舞子にも分けてあげます。\n……甘いものが、体を少し楽にしてくれますよ。',
      system: '体力が回復し、依存度がわずかに上昇しました。'
    },
    {
      narration: 'クリームを指に取り、舞子の唇に塗りつける。',
      l: '自分で舐め取ってください。\n私の指を、丁寧に。\n……良い子です。こんなに素直に従うなんて、本当に可愛い。',
      system: '体力が回復し、依存度がわずかに上昇しました。'
    }
  ]
};

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function updateUI() {
  document.getElementById('lewd-val').textContent = state.lewd;
  document.getElementById('lewd-bar').style.width = state.lewd + '%';
  document.getElementById('stamina-val').textContent = state.stamina;
  document.getElementById('stamina-bar').style.width = state.stamina + '%';
  document.getElementById('dep-val').textContent = state.dep;
  document.getElementById('dep-bar').style.width = state.dep + '%';
  
  const modeEl = document.getElementById('mode-display');
  document.getElementById('mode-text').textContent = modeNames[state.mode];
  modeEl.className = '';
  if (state.mode === 'sweet') modeEl.classList.add('sweet');
  if (state.mode === 'interrogate') modeEl.classList.add('interrogate');
  if (state.mode === 'training') modeEl.classList.add('training');
  
  const comboEl = document.getElementById('combo-display');
  if (state.combo > 0) {
    comboEl.textContent = `連続：${state.combo}`;
    comboEl.classList.add('active');
  } else {
    comboEl.textContent = '連続：0';
    comboEl.classList.remove('active');
  }
  
  renderActions();
}

function renderScene(data) {
  const el = document.getElementById('scene');
  let html = '';
  if (data.narration) html += `<div class="narration">${data.narration}</div>`;
  if (data.l) html += `<div class="l-line">${data.l.replace(/\n/g, '<br>')}</div>`;
  if (data.dote) html += `<div class="dote">（私は、こうして壊れかけた貴女を、本当に愛おしく思っています）</div>`;
  if (data.sfx) html += `<div class="sfx">${data.sfx}</div>`;
  if (data.maiko) html += `<div class="maiko-line">「${data.maiko}」</div>`;
  if (data.system) html += `<div class="system">${data.system}</div>`;
  el.innerHTML = html;
  el.scrollTop = 0;
}

function renderActions() {
  const container = document.getElementById('actions');
  const canAct = state.stamina > 0;
  let html = '';
  
  html += `<button data-act="interrogate" ${!canAct?'disabled':''}>尋問を始める<span class="hint">淫乱+ / 依存+</span></button>`;
  html += `<button data-act="tease" ${!canAct?'disabled':''}>身体を弄ぶ<span class="hint">淫乱+ / 感度上昇</span></button>`;
  html += `<button data-act="kiss" ${!canAct?'disabled':''}>深く口づけする<span class="hint">依存を少し上げる</span></button>`;
  
  if (!state.inserted) {
    html += `<button data-act="insert" ${!canAct?'disabled':''}>挿入する<span class="hint">繋がる</span></button>`;
  } else {
    html += `<button data-act="thrust" class="danger" ${!canAct?'disabled':''}>激しく突く<span class="hint">連続で強度上昇</span></button>`;
  }
  
  html += `<button data-act="climax" class="danger" ${!canAct||!state.inserted?'disabled':''}>限界まで犯す<span class="hint">絶頂 / 依存大上昇</span></button>`;
  
  if (state.lewd >= 40 && state.mode === 'normal') {
    html += `<button data-act="toTraining" ${!canAct?'disabled':''}>調教を始める<span class="hint">モード移行</span></button>`;
  }
  if (state.lewd >= 100 && state.mode !== 'sweet') {
    html += `<button data-act="toSweet" class="sweet-btn">変態雌スイーツへ<span class="hint">完全に堕ちる</span></button>`;
  }
  
  if ((state.dep >= 30 || state.mode === 'sweet') && state.inserted) {
    html += `<button data-act="dote" class="dote-btn" ${!canAct?'disabled':''}>可愛がる<span class="hint">依存↑ / 体力微回復</span></button>`;
  }
  
  if (state.sweets > 0) {
    html += `<button data-act="useSweet" class="item-btn">甘いものを与える（残${state.sweets}）<span class="hint">体力回復 / 依存+</span></button>`;
  }
  
  html += `<button data-act="reset">記録を最初から</button>`;
  
  container.innerHTML = html;
  
  container.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => doAction(btn.dataset.act));
  });
}

function doAction(act) {
  if (state.stamina <= 0 && act !== 'reset' && act !== 'toSweet') return;
  
  let data;
  let lewdGain = 0;
  let staminaLoss = 0;
  let depGain = 0;
  let resetCombo = true;
  
  state.turn++;
  
  switch (act) {
    case 'interrogate':
      state.mode = state.mode === 'sweet' ? 'sweet' : 'interrogate';
      data = pick(scenes.interrogate);
      lewdGain = 7 + Math.floor(Math.random() * 6);
      staminaLoss = 4;
      depGain = 2 + Math.floor(Math.random() * 3);
      break;
      
    case 'tease':
      data = pick(scenes.tease);
      lewdGain = 9 + Math.floor(Math.random() * 7);
      staminaLoss = 5;
      depGain = 1;
      break;
      
    case 'kiss':
      data = pick(scenes.kiss);
      lewdGain = 5 + Math.floor(Math.random() * 4);
      staminaLoss = 2;
      depGain = 3 + Math.floor(Math.random() * 3);
      break;
      
    case 'insert':
      state.inserted = true;
      data = pick(scenes.insert);
      lewdGain = 14 + Math.floor(Math.random() * 8);
      staminaLoss = 7;
      depGain = 4;
      break;
      
    case 'thrust':
      if (!state.inserted) {
        state.inserted = true;
        data = pick(scenes.insert);
        lewdGain = 12;
        staminaLoss = 6;
        depGain = 3;
      } else {
        state.combo++;
        resetCombo = false;
        data = pick(scenes.thrust);
        const comboBonus = Math.min(state.combo * 3, 18);
        lewdGain = 16 + Math.floor(Math.random() * 10) + comboBonus;
        staminaLoss = 10 + Math.floor(state.combo * 1.5);
        depGain = 2 + Math.floor(state.combo / 2);
        
        if (state.mode === 'sweet' && Math.random() > 0.35) {
          data = pick(scenes.sweet);
        }
      }
      break;
      
    case 'climax':
      state.combo++;
      resetCombo = false;
      data = pick(scenes.climax);
      lewdGain = 22 + Math.floor(Math.random() * 12) + Math.min(state.combo * 2, 12);
      staminaLoss = 18 + Math.floor(state.combo * 1.2);
      depGain = 8 + Math.floor(Math.random() * 6) + Math.floor(state.combo / 2);
      state.climaxCount++;
      
      if (state.mode === 'sweet' && Math.random() > 0.3) {
        data = pick(scenes.sweet);
      }
      break;
      
    case 'toTraining':
      state.mode = 'training';
      data = pick(scenes.training);
      lewdGain = 10;
      staminaLoss = 6;
      depGain = 5;
      break;
      
    case 'toSweet':
      state.mode = 'sweet';
      data = pick(scenes.sweet);
      lewdGain = 5;
      staminaLoss = 8;
      depGain = 12;
      break;
      
    case 'dote':
      data = pick(scenes.dote);
      lewdGain = 3 + Math.floor(Math.random() * 4);
      staminaLoss = -4;
      depGain = 6 + Math.floor(Math.random() * 5);
      if (state.mode === 'sweet') depGain += 4;
      break;
      
    case 'useSweet':
      if (state.sweets <= 0) return;
      state.sweets--;
      data = pick(scenes.useSweet);
      lewdGain = 2;
      staminaLoss = -18;
      depGain = 4 + Math.floor(Math.random() * 3);
      break;
      
    case 'reset':
      state.lewd = 0;
      state.stamina = 100;
      state.dep = 0;
      state.mode = 'normal';
      state.inserted = false;
      state.climaxCount = 0;
      state.combo = 0;
      state.sweets = 2;
      state.turn = 0;
      renderScene(scenes.start);
      updateUI();
      return;
  }
  
  if (state.mode === 'sweet' && act !== 'dote' && act !== 'useSweet' && Math.random() > 0.55) {
    if (!data.dote) {
      data.dote = true;
    }
  }
  
  state.lewd = clamp(state.lewd + lewdGain, 0, 100);
  state.stamina = clamp(state.stamina - staminaLoss, 0, 100);
  state.dep = clamp(state.dep + depGain, 0, 100);
  
  if (resetCombo && act !== 'thrust' && act !== 'climax') {
    state.combo = 0;
  }
  
  renderScene(data);
  updateUI();
  
  if (state.stamina <= 0) {
    setTimeout(() => {
      const extra = document.createElement('div');
      extra.className = 'narration';
      extra.style.marginTop = '14px';
      extra.innerHTML = '……体力の限界のようです。<br>今夜は、ここまでにしましょう。舞子。<br>依存度が ' + state.dep + ' まで上がっています。私は、この数字をとても気に入っています。';
      document.getElementById('scene').appendChild(extra);
    }, 500);
  }
  
  if (state.dep >= 100 && act === 'dote') {
    setTimeout(() => {
      const extra = document.createElement('div');
      extra.className = 'dote';
      extra.innerHTML = '（依存度が上限に達しました。私は、もう貴女を誰にも渡しません。これは、二人だけの永遠の記録です）';
      document.getElementById('scene').appendChild(extra);
    }, 700);
  }
}

document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('main-screen').classList.remove('hidden');
  renderScene(scenes.start);
  updateUI();
});

document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('end-screen').classList.add('hidden');
  document.getElementById('main-screen').classList.remove('hidden');
  doAction('reset');
});
</script>
</body>
</html>

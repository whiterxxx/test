function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function updateUI() {
  document.getElementById('lewd-val').textContent = state.lewd;
  document.getElementById('lewd-bar').style.width = state.lewd + '%';
  document.getElementById('stamina-val').textContent = state.stamina;
  document.getElementById('stamina-bar').style.width = state.stamina + '%';
  document.getElementById('dep-val').textContent = state.dep;
  document.getElementById('dep-bar').style.width = state.dep + '%';
  
  const modeEl = document.getElementById('mode-display');
  document.getElementById('mode-text').textContent = modeNames[state.mode];
  modeEl.className = '';
  if (state.mode === 'sweet') modeEl.classList.add('sweet');
  if (state.mode === 'interrogate') modeEl.classList.add('interrogate');
  if (state.mode === 'training') modeEl.classList.add('training');
  if (state.mode === 'unlimited') modeEl.classList.add('unlimited');
  
  const comboEl = document.getElementById('combo-display');
  if (state.combo > 0) {
    comboEl.textContent = `連続：${state.combo}`;
    comboEl.classList.add('active');
  } else {
    comboEl.textContent = '連続：0';
    comboEl.classList.remove('active');
  }
  
  let flags = [];
  if (state.inserted) flags.push('挿入中');
  if (state.restrained) flags.push('拘束中');
  if (state.nipplePlayed) flags.push('乳首感度上昇');
  if (state.mode === 'unlimited') flags.push('無制限');
  document.getElementById('flags').textContent = flags.length ? flags.join(' ／ ') : '';
  
  renderActions();
}

function renderScene(data) {
  const el = document.getElementById('scene');
  let html = '';
  if (data.narration) html += `<div class="narration">${data.narration}</div>`;
  if (data.l) html += `<div class="l-line">${data.l.replace(/\n/g, '<br>')}</div>`;
  if (data.dote) html += `<div class="dote">（私は、こうして壊れかけた貴女を、本当に愛おしく思っています）</div>`;
  if (data.sfx) html += `<div class="sfx">${data.sfx}</div>`;
  if (data.maiko) html += `<div class="maiko-line">「${data.maiko}」</div>`;
  if (data.system) html += `<div class="system">${data.system}</div>`;
  if (data.unlimited) html += `<div class="unlimited-note">無制限調教モード ― 私は、もう止まらない</div>`;
  el.innerHTML = html;
  el.scrollTop = 0;
}

function renderActions() {
  const container = document.getElementById('actions');
  const canAct = state.stamina > 0 || state.mode === 'unlimited';
  let html = '';
  
  html += `<button data-act="interrogate" ${!canAct?'disabled':''}>尋問を始める<span class="hint">淫乱+ / 依存+</span></button>`;
  html += `<button data-act="tease" ${!canAct?'disabled':''}>身体を弄ぶ<span class="hint">淫乱+</span></button>`;
  html += `<button data-act="kiss" ${!canAct?'disabled':''}>深く口づけする<span class="hint">依存+</span></button>`;
  
  html += `<button data-act="nipple" class="nipple-btn" ${!canAct?'disabled':''}>乳首を执拗に責める<span class="hint">感度上昇 / 淫乱++</span></button>`;
  
  if (!state.restrained) {
    html += `<button data-act="bondage" class="bondage-btn" ${!canAct?'disabled':''}>拘束する<span class="hint">無力化 / 依存+</span></button>`;
  } else {
    html += `<button data-act="release" class="bondage-btn" ${!canAct?'disabled':''}>拘束を解く<span class="hint">自由に戻す</span></button>`;
  }
  
  if (!state.inserted) {
    html += `<button data-act="insert" ${!canAct?'disabled':''}>挿入する<span class="hint">繋がる</span></button>`;
  } else {
    html += `<button data-act="thrust" class="danger" ${!canAct?'disabled':''}>激しく突く<span class="hint">連続で強度上昇</span></button>`;
  }
  
  html += `<button data-act="climax" class="danger" ${!canAct||!state.inserted?'disabled':''}>限界まで犯す<span class="hint">絶頂 / 依存大上昇</span></button>`;
  
  if (state.lewd >= 40 && state.mode === 'normal') {
    html += `<button data-act="toTraining" ${!canAct?'disabled':''}>調教を始める<span class="hint">モード移行</span></button>`;
  }
  if (state.lewd >= 100 && state.mode !== 'sweet' && state.mode !== 'unlimited') {
    html += `<button data-act="toSweet" class="sweet-btn">変態雌スイーツへ<span class="hint">完全に堕ちる</span></button>`;
  }
  
  if (state.lewd >= 100 && state.dep >= 100 && state.mode !== 'unlimited') {
    html += `<button data-act="toUnlimited" class="unlimited-btn">無制限調教モードへ<span class="hint">両方MAXで解禁</span></button>`;
  }
  
  if ((state.dep >= 25 || state.mode === 'sweet' || state.mode === 'unlimited') && state.inserted) {
    html += `<button data-act="dote" class="dote-btn" ${!canAct?'disabled':''}>可愛がる<span class="hint">依存↑ / 体力微回復</span></button>`;
  }
  
  if (state.mode === 'unlimited') {
    html += `<button data-act="unlimitedAct" class="unlimited-btn">無制限に犯し続ける<span class="hint">止まらない</span></button>`;
  }
  
  if (state.sweets > 0) {
    html += `<button data-act="useSweet" class="item-btn">甘いものを与える（残${state.sweets}）<span class="hint">体力回復 / 依存+</span></button>`;
  }
  
  html += `<button data-act="reset">記録を最初から</button>`;
  
  container.innerHTML = html;
  
  container.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => doAction(btn.dataset.act));
  });
}

function doAction(act) {
  if (state.stamina <= 0 && state.mode !== 'unlimited' && act !== 'reset' && act !== 'toUnlimited' && act !== 'toSweet') return;
  
  let data;
  let lewdGain = 0;
  let staminaLoss = 0;
  let depGain = 0;
  let resetCombo = true;
  
  state.turn++;
  
  const unlimitedMod = state.mode === 'unlimited' ? 0.35 : 1;
  
  switch (act) {
    case 'interrogate':
      if (state.mode !== 'sweet' && state.mode !== 'unlimited') state.mode = 'interrogate';
      data = pick(scenes.interrogate);
      lewdGain = 7 + Math.floor(Math.random() * 6);
      staminaLoss = 4 * unlimitedMod;
      depGain = 2 + Math.floor(Math.random() * 3);
      break;
      
    case 'tease':
      data = pick(scenes.tease);
      lewdGain = 9 + Math.floor(Math.random() * 7);
      staminaLoss = 5 * unlimitedMod;
      depGain = 1;
      break;
      
    case 'nipple':
      state.nipplePlayed = true;
      data = pick(scenes.nipple);
      lewdGain = 12 + Math.floor(Math.random() * 9);
      staminaLoss = 6 * unlimitedMod;
      depGain = 3 + Math.floor(Math.random() * 3);
      if (state.restrained) lewdGain += 5;
      break;
      
    case 'bondage':
      state.restrained = true;
      data = pick(scenes.bondage);
      lewdGain = 10 + Math.floor(Math.random() * 6);
      staminaLoss = 5 * unlimitedMod;
      depGain = 5 + Math.floor(Math.random() * 4);
      break;
      
    case 'release':
      state.restrained = false;
      data = {
        narration: '私は静かに結び目をほどき、舞子の手首を解放する。',
        l: '……動けますよ。\nただし、逃げようとは思わないでください。\n私は、いつでもまた縛ることができますから。'
      };
      lewdGain = 2;
      staminaLoss = 1;
      depGain = 1;
      break;
      
    case 'kiss':
      data = pick(scenes.kiss);
      lewdGain = 5 + Math.floor(Math.random() * 4);
      staminaLoss = 2 * unlimitedMod;
      depGain = 3 + Math.floor(Math.random() * 3);
      break;
      
    case 'insert':
      state.inserted = true;
      data = pick(scenes.insert);
      lewdGain = 14 + Math.floor(Math.random() * 8);
      staminaLoss = 7 * unlimitedMod;
      depGain = 4;
      if (state.restrained) {
        lewdGain += 4;
        depGain += 3;
      }
      break;
      
    case 'thrust':
      if (!state.inserted) {
        state.inserted = true;
        data = pick(scenes.insert);
        lewdGain = 12;
        staminaLoss = 6 * unlimitedMod;
        depGain = 3;
      } else {
        state.combo++;
        resetCombo = false;
        data = pick(scenes.thrust);
        const comboBonus = Math.min(state.combo * 3, 20);
        lewdGain = 16 + Math.floor(Math.random() * 10) + comboBonus;
        staminaLoss = (10 + Math.floor(state.combo * 1.5)) * unlimitedMod;
        depGain = 2 + Math.floor(state.combo / 2);
        
        if (state.restrained) {
          lewdGain += 6;
          depGain += 2;
        }
        if ((state.mode === 'sweet' || state.mode === 'unlimited') && Math.random() > 0.35) {
          data = pick(scenes.sweet);
        }
      }
      break;
      
    case 'climax':
      state.combo++;
      resetCombo = false;
      data = pick(scenes.climax);
      lewdGain = 22 + Math.floor(Math.random() * 12) + Math.min(state.combo * 2, 14);
      staminaLoss = (18 + Math.floor(state.combo * 1.2)) * unlimitedMod;
      depGain = 8 + Math.floor(Math.random() * 6) + Math.floor(state.combo / 2);
      state.climaxCount++;
      
      if (state.restrained) depGain += 4;
      if ((state.mode === 'sweet' || state.mode === 'unlimited') && Math.random() > 0.3) {
        data = pick(scenes.sweet);
      }
      break;
      
    case 'toTraining':
      state.mode = 'training';
      data = pick(scenes.training);
      lewdGain = 10;
      staminaLoss = 6 * unlimitedMod;
      depGain = 5;
      break;
      
    case 'toSweet':
      state.mode = 'sweet';
      data = pick(scenes.sweet);
      lewdGain = 5;
      staminaLoss = 8 * unlimitedMod;
      depGain = 12;
      break;
      
    case 'toUnlimited':
      state.mode = 'unlimited';
      data = pick(scenes.unlimited);
      lewdGain = 0;
      staminaLoss = 0;
      depGain = 5;
      break;
      
    case 'unlimitedAct':
      data = pick(scenes.unlimited);
      lewdGain = 8 + Math.floor(Math.random() * 6);
      staminaLoss = 4;
      depGain = 6 + Math.floor(Math.random() * 5);
      state.combo++;
      resetCombo = false;
      break;
      
    case 'dote':
      data = pick(scenes.dote);
      lewdGain = 3 + Math.floor(Math.random() * 4);
      staminaLoss = -5;
      depGain = 6 + Math.floor(Math.random() * 5);
      if (state.mode === 'sweet' || state.mode === 'unlimited') depGain += 5;
      if (state.restrained) depGain += 2;
      break;
      
    case 'useSweet':
      if (state.sweets <= 0) return;
      state.sweets--;
      data = pick(scenes.useSweet);
      lewdGain = 2;
      staminaLoss = -20;
      depGain = 4 + Math.floor(Math.random() * 3);
      break;
      
    case 'reset':
      state.lewd = 0;
      state.stamina = 100;
      state.dep = 0;
      state.mode = 'normal';
      state.inserted = false;
      state.restrained = false;
      state.climaxCount = 0;
      state.combo = 0;
      state.sweets = 3;
      state.turn = 0;
      state.nipplePlayed = false;
      renderScene(scenes.start);
      updateUI();
      return;
  }
  
  if ((state.mode === 'sweet' || state.mode === 'unlimited') && act !== 'dote' && act !== 'useSweet' && Math.random() > 0.5) {
    if (!data.dote) data.dote = true;
  }
  
  state.lewd = clamp(state.lewd + lewdGain, 0, 100);
  state.stamina = clamp(state.stamina - staminaLoss, 0, 100);
  state.dep = clamp(state.dep + depGain, 0, 100);
  
  if (resetCombo && act !== 'thrust' && act !== 'climax' && act !== 'unlimitedAct') {
    state.combo = 0;
  }
  
  renderScene(data);
  updateUI();
  
  if (state.stamina <= 0 && state.mode !== 'unlimited') {
    setTimeout(() => {
      const extra = document.createElement('div');
      extra.className = 'narration';
      extra.style.marginTop = '14px';
      extra.innerHTML = '……体力の限界のようです。<br>今夜は、ここまでにしましょう。舞子。<br>依存度が ' + state.dep + ' まで上がっています。私は、この数字をとても気に入っています。';
      document.getElementById('scene').appendChild(extra);
    }, 500);
  }
  
  if (state.dep >= 100 && state.lewd >= 100 && act === 'dote') {
    setTimeout(() => {
      const extra = document.createElement('div');
      extra.className = 'dote';
      extra.innerHTML = '（淫乱度・依存度ともに上限。私は、もう貴女を誰にも渡しません。無制限調教の準備が整いました）';
      document.getElementById('scene').appendChild(extra);
    }, 700);
  }
}

document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('main-screen').classList.remove('hidden');
  renderScene(scenes.start);
  updateUI();
});

document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('end-screen').classList.add('hidden');
  document.getElementById('main-screen').classList.remove('hidden');
  doAction('reset');
});
</script>
</body>
</html>
